name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Python sidecar
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          scripts/build-sidecar.sh

      - name: Install Tauri dependencies
        run: npm install

      - name: Build Tauri app
        run: npx tauri build

      - name: Zip .app bundle
        run: |
          cd src-tauri/target/release/bundle/macos
          zip -r ../../AgenticFlow_aarch64.app.zip AgenticFlow.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: src-tauri/target/release/bundle/AgenticFlow_aarch64.app.zip

  build-macos-x86_64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Python sidecar
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          scripts/build-sidecar.sh

      - name: Install Tauri dependencies
        run: npm install

      - name: Build Tauri app
        run: npx tauri build

      - name: Zip .app bundle
        run: |
          cd src-tauri/target/release/bundle/macos
          zip -r ../../AgenticFlow_x86_64.app.zip AgenticFlow.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: src-tauri/target/release/bundle/AgenticFlow_x86_64.app.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: irm https://astral.sh/uv/install.ps1 | iex
        shell: pwsh

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Python sidecar
        run: |
          $env:Path = "$env:USERPROFILE\.local\bin;$env:Path"
          scripts/build-sidecar.ps1
        shell: pwsh

      - name: Install Tauri dependencies
        run: npm install

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Python sidecar
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          scripts/build-sidecar.sh

      - name: Install Tauri dependencies
        run: npm install

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  release:
    needs: [build-macos-aarch64, build-macos-x86_64, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
